schema_version: "1.0"

extension:
  id: test
  name: "SpecTest -- Quality Built-In"
  version: "2.3.0"
  description: "Quality and testing layer for the Spec Kit (SDD) workflow. Hooks into core Spec Kit commands so quality work happens automatically as part of the workflow."
  author: "Viet Nguyen Duc"
  license: "MIT"

requires:
  speckit_version: ">=0.8.0"

provides:
  commands:
    - name: speckit.test.planaudit
      file: commands/speckit.test.planaudit.md
      description: "Built-in unit-test strategy step for /speckit-plan. Runs as the mandatory after_plan hook and appends a Testing Strategy section to plan.md."

    - name: speckit.test.qaprep
      file: commands/speckit.test.qaprep.md
      description: "Built-in test-prep step for /speckit-tasks. Runs as the mandatory after_tasks hook and writes FEATURE_DIR/test-plan.md, scaffolds higher-layer tests, and seeds FEATURE_DIR/checklists/test.md before /speckit-analyze and /speckit-implement run."

    - name: speckit.test.tasksaudit
      file: commands/speckit.test.tasksaudit.md
      description: "Pre-implementation gate. Runs as the mandatory before_implement hook (audit only); BLOCKS if any P1 spec item lacks a unit/contract test task in tasks.md."

    - name: speckit.test.qareview
      file: commands/speckit.test.qareview.md
      description: "Built-in consistency and quality verdict. Runs as the advisory after_analyze hook (pre-implementation read) and the mandatory after_implement hook (formal pre-merge gate). Emits a Gate PASS or BLOCKED verdict to chat and writes FEATURE_DIR/review.md (overwritten each run)."

hooks:
  after_plan:
    command: speckit.test.planaudit
    optional: false
    prompt: "Plan the unit/contract test strategy and write it into plan.md?"
    description: "Mandatory built-in step of /speckit-plan; appends a Testing Strategy section to plan.md."

  after_tasks:
    command: speckit.test.qaprep
    optional: false
    prompt: "Prepare the test plan, scaffold higher-layer tests, and seed the quality checklist?"
    description: "Mandatory built-in test-prep step of /speckit-tasks; writes FEATURE_DIR/test-plan.md, scaffolds the higher-layer tests as failing stubs, and seeds FEATURE_DIR/checklists/test.md so the artefacts exist before /speckit-analyze and /speckit-implement."

  before_implement:
    command: speckit.test.tasksaudit
    optional: false
    prompt: "Audit the unit/TDD test-task gate before implementation starts?"
    description: "Mandatory gate (audit-only); BLOCKS if any P1 spec item lacks a unit/contract task in tasks.md."

  after_analyze:
    command: speckit.test.qareview
    optional: true
    prompt: "Produce the advisory pre-implementation verdict?"
    description: "Advisory verdict after /speckit-analyze; refreshes FEATURE_DIR/review.md with a pre-implementation read of consistency and readiness. /speckit-analyze is optional in the standard Spec Kit workflow, so this hook never gates implementation."

  after_implement:
    command: speckit.test.qareview
    optional: false
    prompt: "Produce the formal pre-merge verdict?"
    description: "Mandatory formal pre-merge gate; rereads workflow artefacts plus actual test results, refreshes FEATURE_DIR/review.md with the Gate PASS or BLOCKED verdict, and emits the same to chat."

tags:
  - "testing"
  - "quality"
  - "acceptance-scenarios"
  - "functional-requirements"
  - "traceability"
  - "coverage"
  - "sdd"
  - "spec-kit"
