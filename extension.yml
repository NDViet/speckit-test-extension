schema_version: "1.0"

extension:
  id: test
  name: "SpecTest -- Quality Built-In"
  version: "2.2.0"
  description: "Quality and testing layer for the Spec Kit (SDD) workflow. Hooks into core Spec Kit commands so quality work happens automatically as part of the workflow."
  author: "Viet Nguyen Duc"
  license: "MIT"

requires:
  speckit_version: ">=0.8.0"

provides:
  commands:
    - name: speckit.test.planaudit
      file: commands/speckit.test.planaudit.md
      description: "Built-in unit-test strategy step for /speckit-plan. Runs as the mandatory after_plan hook and appends a Testing Strategy section to plan.md."

    - name: speckit.test.tasksaudit
      file: commands/speckit.test.tasksaudit.md
      description: "Verification of the unit-test plan in tasks.md. Runs as the advisory after_tasks hook and the mandatory before_implement hook (gate, audit only)."

    - name: speckit.test.qaprep
      file: commands/speckit.test.qaprep.md
      description: "Built-in test-prep step for /speckit-implement. Runs as the mandatory after_implement hook and writes FEATURE_DIR/test-plan.md, scaffolds higher-layer tests, and seeds FEATURE_DIR/checklists/test.md."

    - name: speckit.test.qareview
      file: commands/speckit.test.qareview.md
      description: "Built-in consistency and quality verdict for /speckit-analyze. Runs as the mandatory after_analyze hook. Emits a Gate PASS or BLOCKED verdict to chat and writes FEATURE_DIR/review.md (overwritten each run)."

hooks:
  after_plan:
    command: speckit.test.planaudit
    optional: false
    prompt: "Plan the unit/contract test strategy and write it into plan.md?"
    description: "Mandatory built-in step of /speckit-plan; appends a Testing Strategy section to plan.md."

  after_tasks:
    command: speckit.test.tasksaudit
    optional: true
    prompt: "Verify generated test tasks against the plan.md Testing Strategy?"
    description: "Advisory verification right after /speckit-tasks."

  before_implement:
    command: speckit.test.tasksaudit
    optional: false
    prompt: "Audit the unit/TDD test-task gate before implementation starts?"
    description: "Mandatory gate (audit-only); BLOCKED until missing tasks are added."

  after_implement:
    command: speckit.test.qaprep
    optional: false
    prompt: "Prepare the test plan, scaffold higher-layer tests, and seed the quality checklist?"
    description: "Mandatory built-in test-prep step of /speckit-implement."

  after_analyze:
    command: speckit.test.qareview
    optional: false
    prompt: "Produce the consistency and quality verdict for this run of /speckit-analyze?"
    description: "Mandatory built-in verdict step of /speckit-analyze; writes FEATURE_DIR/review.md."

tags:
  - "testing"
  - "quality"
  - "acceptance-scenarios"
  - "functional-requirements"
  - "traceability"
  - "coverage"
  - "sdd"
  - "spec-kit"
